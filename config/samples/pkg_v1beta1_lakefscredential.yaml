apiVersion: pkg.internal/v1beta1
kind: LakeFSCredential
metadata:
  labels:
    app.kubernetes.io/name: lakefs-oss-contrib
    app.kubernetes.io/managed-by: kustomize
  name: admin-credentials
spec:
  userRef:
    name: admin-user
  accessKeyId: lakefs_ak_admin
  secretRef:
    name: admin-credentials
    key: secretAccessKey
---
apiVersion: pkg.internal/v1beta1
kind: LakeFSCredential
metadata:
  labels:
    app.kubernetes.io/name: lakefs-oss-contrib
    app.kubernetes.io/managed-by: kustomize
  name: user-credentials
spec:
  userRef:
    name: user
  accessKeyId: lakefs_ak_user
  secretRef:
    name: user-credentials
    key: secretAccessKey
---
apiVersion: pkg.internal/v1beta1
kind: LakeFSCredential
metadata:
  labels:
    app.kubernetes.io/name: lakefs-oss-contrib
    app.kubernetes.io/managed-by: kustomize
  name: readonly-user-credentials
spec:
  userRef:
    name: readonly-user
  accessKeyId: lakefs_ak_readonly
  secretRef:
    name: readonly-user-credentials
    key: secretAccessKey
