apiVersion: pkg.internal/v1beta1
kind: LakeFSRole
metadata:
  labels:
    app.kubernetes.io/name: lakefs-oss-contrib
    app.kubernetes.io/managed-by: kustomize
  name: admin
spec:
  description: Administrator
  policies:
  - name: admin
    statement:
    - effect: allow
      action:
      - fs:*
      - auth:*
      - ci:*
      - retention:*
      - branches:*
      resource: "*"
