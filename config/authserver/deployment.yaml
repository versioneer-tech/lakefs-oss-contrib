apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: lakefs-oss-contrib
    app.kubernetes.io/component: auth-server
    app.kubernetes.io/managed-by: kustomize
  name: auth-server
  namespace: system
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: lakefs-oss-contrib
      app.kubernetes.io/component: auth-server
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: auth-server
      labels:
        app.kubernetes.io/name: lakefs-oss-contrib
        app.kubernetes.io/component: auth-server
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /app
        args:
        - --auth-server-bind-address=:8080
        - --metrics-bind-address=:8081
        - --health-probe-bind-address=:8082
        - --default-user-namespace=$(POD_NAMESPACE)
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        image: authserver:latest
        imagePullPolicy: Always
        name: auth-server
        ports:
        - containerPort: 8080
          name: auth-http
          protocol: TCP
        - containerPort: 8081
          name: metrics
          protocol: TCP
        - containerPort: 8082
          name: health
          protocol: TCP
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
      serviceAccountName: auth-server
      terminationGracePeriodSeconds: 10
