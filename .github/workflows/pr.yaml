name: PR

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main

permissions:
  contents: read

jobs:
  lakefs_s3_e2e_tests:
    name: lakeFS S3 e2e tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Kind
        uses: helm/kind-action@v1
        with:
          cluster_name: lakefs-oss-contrib-e2e

      - name: Install AWS CLI
        run: |
          if ! command -v aws >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y awscli
          fi

      - name: Run lakeFS S3 e2e tests
        env:
          E2E_CLEANUP: "true"
          KIND_CLUSTER_NAME: lakefs-oss-contrib-e2e
          REGISTRY_NAME: kind-registry
          REGISTRY_PORT: "5001"
        run: make test-e2e-kind
